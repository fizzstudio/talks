<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%"
  viewBox="0 0 1100 850">

  <title>Limitations of Data Tables</title>

  <script href="_silverbullet.js" />
  <style type="text/css">
    @import url(_silverbullet.css);
  </style>
  <style type="text/css">
    .emphasize {
      font-weight: bold;
    }

    #content {
      font-size: 30px;
      text-anchor: middle;
    }

    .list {
      font-size: 25px;
      text-anchor: middle;
    }

    .heading {
      text-anchor: middle;
    }

    .colorbox text {
      fill: white;
    }

    .bad {
      fill: hsl(0, 90%, 90%);
      stroke: none;
    }

    .subhead {
      font-weight: bold;
      font-size: 30px;
    }
  </style>

  <defs id="defs-1">


  </defs>

  <rect id="bg" x="-1000" y="-1000" width="3000" height="3000" fill="white" />

  <text id="head" x="550" y="1.5em" class="heading">Limitations of Data Tables</text>

  <g id="content">
    <g data-fire="1" data-blank="true" transform="translate(150,100)">
      <image href="./assets/lookup-table-nav-label.jpeg" width="800" />
    </g>


    <g data-fire="2" data-blank="true" transform="translate(550,400)">
      <text>Predictable, consistent user navigation to each cell,
        <tspan x="0" dy="1.3em">orients user with row and column headers</tspan>
      </text>
    </g>

    <g data-fire="3" data-blank="true" transform="translate(550,510)">
      <text>Good for reference tables </text>
    </g>

    <g data-fire="4" data-blank="true" transform="translate(550,580)">
      <text>Not as good for data tables,
        <tspan x="0" dy="1.3em">where relation between values is important</tspan>
      </text>
    </g>

    <g data-fire="6" data-blank="true" transform="translate(550,650)">
      <rect x="-380" y="0" width="840" height="90" class="bad"/>
      <text x="10" y="35">
        <tspan data-fire="5" data-blank="true" class="subhead">This is the best accessibility that Tableau and PowerBI offer</tspan>
        <tspan x="50" dy="1.5em">Also, inconsistent navigation, so screen reader users have to learn each time</tspan>
        <tspan x="50" dy="1.5em">We're developing a standard for consistent navigation</tspan>
      </text>

    </g>
  </g>

</svg>